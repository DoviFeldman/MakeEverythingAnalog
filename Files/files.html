<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>~/files</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #00ff41;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 15px;
      min-height: 100vh;
      padding: 40px 48px;
      line-height: 1.8;
    }

    .line { white-space: pre; }
    .dim  { color: #005514; }

    .file-link {
      color: #00ff41;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-size: inherit;
      padding: 0;
      transition: color 0.15s, text-shadow 0.15s;
    }
    .file-link:hover {
      color: #fff;
      text-shadow: 0 0 8px #00ff41;
    }
    .file-link:active { color: #afffbf; }

    .blink {
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .reveal { opacity: 0; }
    .visible { opacity: 1; transition: opacity 0.1s; }
  </style>
</head>
<body>

<div id="terminal"></div>

<script>
  // Add your files here — use the raw GitHub URL for each one
  const files = [
    {
      name: 'Chamfured 3D Car Decals!!!!!.3mf',
      url:  'https://github.com/DoviFeldman/MakeEverythingAnalog/raw/refs/heads/main/Files/Chamfured%203D%20Car%20Decals!!!!!.3mf'
    },
    // Add more files like this:
    // { name: 'another-file.stl', url: 'https://github.com/DoviFeldman/MakeEverythingAnalog/raw/refs/heads/main/Files/another-file.stl' },
  ];

  const lines = [
    { text: 'Last Update: Mar 2nd 2026 on ttys001', cls: 'dim' }, // remember to update this every time i add files
    { text: '' },
    { text: 'MakeEverythingAnalog:~$ ls -lh ./files', cls: 'prompt' },
    { text: '' },
    { text: 'total ' + files.length, cls: 'dim' },
    ...files.map(f => ({ type: 'file', file: f })),
    { text: '' },
    // { text: 'user@github:~$ ', cls: 'prompt-cursor' },
  ];

  const terminal = document.getElementById('terminal');

  async function render() {
    for (const item of lines) {
      await new Promise(r => setTimeout(r, 60));
      const div = document.createElement('div');
      div.className = 'line reveal';

      if (item.type === 'file') {
        const f = item.file;
        div.innerHTML = '<span class="dim">-rw-r--r--  1 user  staff   </span><button class="file-link" onclick="window.open(\'' + f.url + '\', \'_blank\')">' + f.name + '</button>';
      } else if (item.cls === 'dim') {
        div.innerHTML = '<span class="dim">' + (item.text || '&nbsp;') + '</span>';
      } else if (item.cls === 'prompt') {
        div.innerHTML = '<span class="dim">' + item.text + '</span>';
      } else if (item.cls === 'prompt-cursor') {
        div.innerHTML = '<span class="dim">' + item.text + '</span><span class="blink">█</span>';
      } else {
        div.innerHTML = item.text || '&nbsp;';
      }

      terminal.appendChild(div);
      requestAnimationFrame(() => div.classList.add('visible'));
    }
  }

  render();
</script>
</body>
</html>
